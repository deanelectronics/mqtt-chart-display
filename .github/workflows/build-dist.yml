name: Build & publish dist branch

# Bygger appen som statiska filer och pushar dem till branchen `dist`.
# Då kan Raspberry Pi:n bara köra `git pull` i /var/www/html/ — utan att
# bun, node eller bygg-verktyg behöver finnas på Pi:n.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build (static)
        run: NITRO_PRESET=static bun run build

      - name: Locate static client output
        id: out
        run: |
          # TanStack Start lägger client-bundlen i en av dessa mappar
          for d in dist/client .output/public dist .output/client; do
            if [ -f "$d/index.html" ]; then
              echo "Hittade index.html i $d"
              echo "dir=$d" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "Hittade ingen index.html i någon känd output-mapp"
          ls -la dist .output 2>/dev/null || true
          exit 1


      - name: Publish to dist branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SRC="${{ steps.out.outputs.dir }}"
          TMP=$(mktemp -d)
          cp -r "$SRC"/. "$TMP"/
          # SPA-fallback för Apache: kopiera index.html till 404.html så
          # deep-links inte ger 404 om man råkar surfa till en sub-path.
          cp "$TMP/index.html" "$TMP/404.html" 2>/dev/null || true

          cd "$TMP"
          git init -b dist
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          git commit -m "build: ${GITHUB_SHA::7}"
          git push --force origin dist
